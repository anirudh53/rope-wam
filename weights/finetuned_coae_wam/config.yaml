model:
  bottleneck_size: 10
  #[16, 32, 64, 64, 128, 128, 256, 256, 512, 512]
  num_encoder_downsamples: 4
  num_layers_E_0: 1
  num_filters_E_0: 8
  #32
  activation_E_0: tanh
  num_layers_E_1: 1
  num_filters_E_1: 16
  #64
  activation_E_1: tanh
  num_layers_E_2: 1
  num_filters_E_2: 32
  activation_E_2: leakyrelu
  num_layers_E_3: 1
  num_filters_E_3: 64
  activation_E_3: softplus
  num_decoder_upsamples: 4
  #[512, 512, 256, 256, 128, 128, 64, 64, 32, 16]
  num_layers_D_0: 1
  num_filters_D_0: 64
  activation_D_0: relu
  num_layers_D_1: 1
  num_filters_D_1: 32
  activation_D_1: tanh
  num_layers_D_2: 1
  num_filters_D_2: 16
  activation_D_2: tanh
  num_layers_D_3: 1
  num_filters_D_3: 8
  activation_D_3: softplus
  lambda_loss: 7.5
  learning_rate: 0.0001
  alpha: 0.1
  batch_size: 64

training:
  epochs: 200
  batch_size: 64
  patience: 60
  optimizer: adam
  learning_rate: 0.0001
  model_name: COAE_train_best_00077_3d_double_encoder_logcosh_depth_weighted_no_sampler2_trial
  tuner_name: COAE_train_best_00077_3d_double_encoder_logcosh_depth_weighted_no_sampler2_trial
  step_size: 30
  gamma: 0.7
  alpha: 0.31
  #alpha: 0.1
  weight_path: #/data/harshitha_challa/COAE-WAM/weights/COAE_train_best_00077_3d_double_encoder_logcosh_depth_weighted_no_sampler/13epoch.pth

data:
  directory: /data/WAM/WAM_Density/
  #directory: /data/harshitha_challa/
  suffix: _density_data.h5
  training_years: [2008, 2009, 2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018]
  #training_years: [2008, 2009, 2010, 2011, 2012]
  #training_years: [2008]
  validation_years: [2020, 2022]
  #validation_years: [dummy]
  test_years: [2019, 2021, 2023]
